<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>PUBG Overlay Controller</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #2c3e50; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 350px; }
        h2 { color: #f39c12; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 6px; border: none; box-sizing: border-box; font-size: 16px; background: #34495e; color: white; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; background: #f39c12; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        button:hover { background: #e67e22; }
        .info { font-size: 12px; color: #bdc3c7; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>PUBG OVERLAY</h2>
        <input type="text" id="tourneyID" placeholder="กรอก Tournament ID (เช่น as-pgs1ss)">
        <button onclick="generateLink()">LAUNCH OVERLAY</button>
        <p class="info">เมื่อกดแล้ว ให้ก๊อปปี้ URL ที่ได้ส่งให้เพื่อน</p>
    </div>

    <script>
        function generateLink() {
            const id = document.getElementById('tourneyID').value.trim();
            if (id) {
                // เปลี่ยนหน้าไปยัง overlay.html พร้อมส่งค่า ID ผ่าน URL
                window.location.href = `overlay.html?id=${id}`;
            } else {
                alert("กรุณากรอก ID ด้วยครับ");
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>PUBG BLUECHIP OVERLAY</title>
    <style>
        /* --- 1. การติดตั้งฟอนต์ Transducer Bold --- */
        @font-face {
            font-family: 'TransducerBold';
            src: url('TransducerBold.otf') format('opentype'); 
            font-weight: bold;
            font-style: normal;
        }

        body { 
            margin: 0; padding: 0; 
            background: transparent; 
            overflow: hidden; 
            width: 1920px; height: 1080px; 
            font-family: 'TransducerBold', sans-serif; 
        }

        /* ตำแหน่งแจ้งเตือน (ขวากลางจอ) */
        .notif-container { 
            position: absolute; 
            top: 45%; 
            right: 50px; 
            transform: translateY(-50%); 
            width: 800px; 
            display: flex; 
            flex-direction: column; 
            align-items: flex-end; 
            pointer-events: none; 
        }
        
        .item-popup { 
            opacity: 0; 
            transform: translateX(100px); 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            margin-bottom: 20px; 
        }
        .item-popup.show { opacity: 1; transform: translateX(0); }

        /* --------------------------------------
           BLUECHIP Style (พื้นหลัง USING BLUECHIP.png)
        -------------------------------------- */
        .popup-bluechip {
            width: 400px; height: 100px;
            background-image: url('USING BLUECHIP.png'); 
            background-size: 100% 100%;
            display: flex; align-items: center; padding: 0 20px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.4));
        }

        .bc-logo-wrapper {
            width: 75px; height: 75px;
            margin-right: 15px;
            display: flex; align-items: center; justify-content: center;
        }

        .bc-logo {
            width: 60px; height: 60px;
            background-size: contain; background-repeat: no-repeat;
            background-position: center;
        }

        .bc-info { display: flex; flex-direction: column; margin-left: 10px; }
        .bc-player { 
            font-size: 32px; color: #fff; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); 
            text-transform: uppercase; line-height: 1; 
        }
        .bc-status { 
            font-size: 14px; color: #f39c12; 
            text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; 
        }

        .flash-anim { animation: flashEffect 0.6s ease-out; }
        @keyframes flashEffect { 0% { filter: brightness(1); } 20% { filter: brightness(2.5); } 100% { filter: brightness(1); } }
    </style>
</head>
<body>
    <div id="notifArea" class="notif-container"></div>

    <script>
        // ดึง ID จาก URL (?id=xxxx)
        const urlParams = new URLSearchParams(window.location.search);
        const TOURNAMENT_ID = urlParams.get('id');
        
        // พาธโลโก้ทีมใน XAMPP (แก้เป็น /pupup/ ตามที่คุณต้องการ)
        const LOCAL_LOGO_PATH = "http://localhost/pupup/"; 

        let previousBCStats = {}; 
        let isProcessing = false;
        let queue = [];

        async function checkData() {
            if(!TOURNAMENT_ID) return;
            const t = new Date().getTime();
            const url = `https://domestic.atum.live/api/pubg/liveleaderboard?account_id=nttapon7799&series=sea-thsc&tournament_id=${TOURNAMENT_ID}&mode=post&all_teams=true&_t=${t}`;

            try {
                const res = await fetch(url);
                const json = await res.json();
                if (!json.data || !json.data.teams) return;

                // ตรวจสอบเฉพาะการใช้ Bluechip
                json.data.teams.forEach(team => {
                    if (!team.players) return;
                    team.players.forEach(player => {
                        const pID = `${team.team_name}_${player.name}`;
                        const currentBC = player.useBluechipCount || 0;
                        
                        // ถ้าจำนวนการใช้ Bluechip เพิ่มขึ้น ให้เพิ่มเข้าคิวแสดงผล
                        if (previousBCStats[pID] !== undefined && currentBC > previousBCStats[pID]) {
                            enqueue({ team: team.team_name, player: player.name });
                        }
                        previousBCStats[pID] = currentBC;
                    });
                });
            } catch (e) { console.error("API Error: Check Tournament ID or Connection"); }
        }

        function enqueue(item) {
            queue.push(item);
            processQueue();
        }

        function processQueue() {
            if (isProcessing || queue.length === 0) return;
            isProcessing = true;

            const data = queue.shift();
            const area = document.getElementById('notifArea');
            const popup = document.createElement('div');
            
            popup.className = 'item-popup popup-bluechip flash-anim';
            const logoUrl = `${LOCAL_LOGO_PATH}${data.team}.png`;

            popup.innerHTML = `
                <div class="bc-logo-wrapper">
                    <div class="bc-logo" style="background-image: url('${logoUrl}');"></div>
                </div>
                <div class="bc-info">
                    <div class="bc-player">${data.player}</div>
                    <div class="bc-status">USING BLUECHIP</div>
                </div>
            `;
            
            area.appendChild(popup);
            setTimeout(() => popup.classList.add('show'), 100);

            // แสดงค้างไว้ 5 วินาทีแล้วหายไป
            setTimeout(() => {
                popup.classList.remove('show');
                setTimeout(() => {
                    popup.remove();
                    isProcessing = false;
                    processQueue();
                }, 600);
            }, 5000);
        }

        // เช็คข้อมูลทุกๆ 2 วินาที
        setInterval(checkData, 2000);
        checkData();
    </script>
</body>
</html>
